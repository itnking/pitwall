name: Mise à jour des données PITWALL

on:
  schedule:
    - cron: "17 5 * * *"   # chaque jour ~07h17 (Paris) — l'heure UTC du cron
  workflow_dispatch:        # + bouton « Run workflow » manuel

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le dépôt
        uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Lancer le robot
        run: python fetch_data.py

      - name: Publier data.json si modifié
        run: |
          git config user.name  "pitwall-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "Données du $(date -u +%Y-%m-%d)"
          git push
